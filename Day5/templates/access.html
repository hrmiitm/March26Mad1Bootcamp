{% extends './layouts/bootstrap.html' %}

{% block title %}Login / Register{% endblock %}

{% block body %}
{% include './BasicComponents/navbar.html' %}
{% include './BasicComponents/flash.html' %}

<div class="container py-5">
    <div class="row justify-content-center g-4">

        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-primary">Login</h4>
                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label text-muted small">Email address</label>
                            <input type="email" class="form-control" id="loginEmail" name="email" required
                                placeholder="you@example.com">
                        </div>
                        <div class="mb-4">
                            <label for="loginPassword" class="form-label text-muted small">Password</label>
                            <input type="password" class="form-control" id="loginPassword" name="password" required
                                placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-success">Register</h4>
                    <form action="/register" method="POST">
                        <div class="mb-3">
                            <label for="regUsername" class="form-label text-muted small">Username</label>
                            <input type="text" class="form-control" id="regUsername" name="username" required
                                placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label for="regEmail" class="form-label text-muted small">Email address</label>
                            <input type="email" class="form-control" id="regEmail" name="email" required
                                placeholder="you@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="regPassword1" class="form-label text-muted small">Password</label>
                            <input type="password" class="form-control" id="regPassword1" name="password1" required
                                placeholder="••••••••">
                        </div>
                        <div class="mb-4">
                            <label for="regPassword2" class="form-label text-muted small">Confirm Password</label>
                            <input type="password" class="form-control" id="regPassword2" name="password2" required
                                placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Create Account</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
