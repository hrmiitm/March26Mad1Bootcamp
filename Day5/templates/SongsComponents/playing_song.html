{% if song %}
<div class="card border-0 shadow-sm">
    <img src="{{ url_for('static', filename='SongThumbnails/songthumbnail.jpg') }}" class="card-img-top"
        style="height: 170px; object-fit: cover;" alt="Thumbnail">
    <div class="card-body pb-2">
        <h6 class="text-primary mb-0 text-truncate">{{ song.name }}</h6>
        <small class="text-muted">{{ song.user.username }}</small>

        <audio controls class="w-100 mt-3" style="height: 38px;">
            <source src="{{ url_for('static', filename='songs/' + song.id|string + '.mp3') }}" type="audio/mpeg">
        </audio>

        {% if song.lyrics %}
        <div class="mt-3 p-2 bg-light rounded">
            <small class="text-muted d-block fw-semibold mb-1">Lyrics</small>
            <small style="white-space: pre-wrap; font-size: 0.78rem;">{{ song.lyrics }}</small>
        </div>
        {% endif %}
    </div>
    <div class="card-footer bg-transparent border-0 d-flex justify-content-between pb-3">
        <small class="text-muted">⏱ {{ song.duration or '—' }}</small>
        <small class="text-muted">📅 {{ song.date }}</small>
    </div>
</div>
{% else %}
<div class="card border-0 shadow-sm text-center py-5 text-muted bg-white">
    <div class="fs-1 mb-2">🎵</div>
    <p class="mb-0 small">Select a song to play</p>
</div>
{% endif %}
