<div class="d-flex flex-column gap-5">
    {% for album in albums %}
    <div class="album-section">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 border-bottom pb-2">
            <h4 class="text-success m-0">{{album.name}} <small class="text-muted fs-6 ms-2">({{album.artist}} -
                    {{album.genre}})</small></h4>
            <div>
                <a href="?album_id={{album.id}}" class="btn btn-outline-warning btn-sm me-2">Edit Album</a>
                <a href="{{ url_for('delete_album', album_id=album.id) }}" class="btn btn-outline-danger btn-sm"
                    onclick="return confirm('Are you sure you want to delete this album?');">Delete Album</a>
            </div>
        </div>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for song in album.songs %}
            <div class="col">
                <div class="card h-100 shadow-sm border-0">
                    <img src="{{url_for('static', filename='SongThumbnails/songthumbnail.jpg')}}" class="card-img-top"
                        style="height: 140px; object-fit: cover;" alt="Thumbnail">
                    <div class="card-body">
                        <h5 class="card-title text-primary mb-1 text-truncate">{{song.name}}</h5>
                        <div class="d-flex gap-2 mt-3">
                            <a href="?song_id={{song.id}}" class="btn btn-outline-primary btn-sm flex-fill">Play</a>
                        </div>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-muted small">No songs in this album.</div>
            {% endfor %}
        </div>
    </div>
    {% else %}
    <div class="text-center text-muted py-5">You haven't created any albums yet.</div>
    {% endfor %}
</div>
