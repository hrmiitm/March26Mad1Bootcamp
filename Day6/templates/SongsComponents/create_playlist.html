<form action="/create_playlist" method="post" class="card border-0 shadow-sm p-3 mb-3">
    <h6 class="text-info mb-3">New Playlist</h6>
    <div class="mb-2">
        <label class="form-label text-muted small">Name</label>
        <input type="text" name="name" class="form-control form-control-sm" placeholder="My Playlist" required>
    </div>
    <button type="submit" class="btn btn-info btn-sm text-white w-100">Create</button>
</form>
